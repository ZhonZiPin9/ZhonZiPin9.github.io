<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杳无音讯 | 晚安</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 紫色彗星 */
        .comet {
            position: fixed;
            width: 2px;
            height: 2px;
            background: #a855f7;
            border-radius: 50%;
            box-shadow: 0 0 6px #a855f7, 0 0 14px #a855f7;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
        }
        .comet::after {
            content: "";
            position: absolute;
            width: 100px;
            height: 1px;
            background: linear-gradient(to right, rgba(168,85,247,0.5), transparent);
            right: 0;
            top: 0;
        }

        #mainView, #galaxyView {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }
        #galaxyView {
            display: none;
            background: #000;
            z-index: 10;
        }

        /* 普通星星 */
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            pointer-events: auto;
            cursor: pointer;
            animation: twinkle ease-in-out infinite;
            transition: all 0.3s ease;
        }
        @keyframes twinkle {
            0%,100% { opacity: var(--o1); }
            50% { opacity: var(--o2); }
        }

        /* 最后一颗星星：紫色 最亮 最大 */
        .star.last-purple {
            background: #a855f7 !important;
            box-shadow: 0 0 20px #a855f7, 0 0 40px rgba(168,85,247,1) !important;
            transform: scale(1.8);
            z-index: 6;
        }

        .galaxy {
            position: absolute;
            border-radius: 50%;
            pointer-events: auto;
            cursor: pointer;
            animation: galaxyRotate 22s linear infinite;
            z-index: 2;
            filter: blur(1.2px);
            transition: all 0.5s ease;
        }
        @keyframes galaxyRotate {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.08); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* 新星系高亮闪烁特效 */
        .galaxy.new-burst {
            animation: galaxyBurst 1.2s ease-out;
        }
        @keyframes galaxyBurst {
            0% { transform: scale(0.4); opacity: 0; }
            60% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 飞入五角星（星星 & 星系共用） */
        .flying-star {
            position: fixed;
            z-index: 99999;
            pointer-events: none;
            transition: all 2.4s ease-out;
            width: 16px;
            height: 16px;
            background: #a855f7;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            box-shadow: 0 0 20px #a855f7, 0 0 40px rgba(168,85,247,1);
        }

        .input-area {
            position: fixed;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 560px;
            z-index: 9999;
            pointer-events: auto !important;
            text-align: center;
        }
        .input-box {
            width: 100%;
            padding: 15px 22px;
            border: none;
            border-radius: 35px;
            background: rgba(255,255,255,0.13);
            backdrop-filter: blur(12px);
            color: #fff;
            font-size: 15px;
            outline: none;
            margin-bottom: 12px;
        }
        .plus-btn {
            position: absolute;
            right: 18px;
            top: 14px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            border: none;
        }
        .send-btn {
            padding: 10px 28px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            top: 22%;
            left: 50%;
            transform: translate(-50%,-50%);
            padding: 12px 24px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 22px;
            z-index: 9999999;
            font-size: 15px;
            color: #fff;
            text-align: center;
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            background: rgba(0,0,0,0.9);
            padding: 35px;
            border-radius: 20px;
            z-index: 9999;
            display: none;
            min-width: 280px;
            color: #fff;
        }
        .verify-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 999999;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .verify-input {
            padding: 14px 24px;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            outline: none;
            width: 240px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="mainView"></div>
    <div id="galaxyView"></div>

    <div class="input-area">
        <input type="text" class="input-box" id="input" placeholder="给想念一处寄存的星海。">
        <button class="plus-btn" id="plusBtn">+</button>
        <button class="send-btn" id="sendBtn">星海会替你记得</button>
    </div>

    <div class="modal" id="modal">
        <div id="modalDate" style="font-size:12px;color:#aaa;margin-bottom:10px"></div>
        <div id="modalContent"></div>
    </div>
    <div class="verify-modal" id="verifyModal">
        <input class="verify-input" id="verifyInput" placeholder="你的名字">
    </div>

<script>
    const GROUP_SIZE = 10;
    const main = document.getElementById('mainView');
    const galaxyView = document.getElementById('galaxyView');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const plusBtn = document.getElementById('plusBtn');
    const modal = document.getElementById('modal');
    const modalDate = document.getElementById('modalDate');
    const modalContent = document.getElementById('modalContent');
    const verifyModal = document.getElementById('verifyModal');
    const verifyInput = document.getElementById('verifyInput');

    let groups = JSON.parse(localStorage.getItem('groups') || '[]');
    let isVerified = false;

    // 紫色彗星 正常生成
    function createComet() {
        let c = document.createElement('div');
        c.className = 'comet';
        let startX = window.innerWidth + 150;
        let startY = Math.random() * window.innerHeight * 0.6;
        c.style.left = startX + 'px';
        c.style.top = startY + 'px';
        document.body.appendChild(c);
        
        setTimeout(() => {
            c.style.transition = 'all 3.2s linear';
            c.style.opacity = '1';
            c.style.left = '-200px';
            c.style.top = (startY + 150) + 'px';
        },20);
        setTimeout(()=>c.remove(), 4000);
    }
    setInterval(createComet, 4500);

    // 返回按钮 100% 正常
    window.goBack = function() {
        galaxyView.style.display = 'none';
    }

    function toast(msg) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(()=>t.remove(), 2000);
    }

    // 飞入五角星动画（星星 & 星系通用）
    function flyToTarget(targetX, targetY) {
        let star = document.createElement('div');
        star.className = 'flying-star';
        const rect = input.getBoundingClientRect();
        const startX = rect.left + rect.width/2 - 8;
        const startY = rect.top + rect.height/2 - 8;
        star.style.left = startX + 'px';
        star.style.top = startY + 'px';
        document.body.appendChild(star);
        setTimeout(() => {
            star.style.left = targetX + '%';
            star.style.top = targetY + '%';
            star.style.opacity = 0;
        }, 50);
        setTimeout(() => star.remove(), 2600);
    }

    // 根据字数获取星星样式：越长越红、越大
    function getStarStyle(len) {
        let baseSize = 1.0;
        let r = 255, g = 255, b = 255;
        if (len > 10) {
            let level = Math.min((len - 10) / 15, 1);
            baseSize = 1 + level * 0.4;
            g = Math.floor(255 - 255 * level);
            b = Math.floor(255 - 255 * level);
        }
        return { size: baseSize, color: `rgb(${r},${g},${b})` };
    }

    // 渲染主页面
    function renderMain() {
        main.innerHTML = '';

        // 渲染星系
        groups.forEach((g, idx) => {
            if (g.items.length === GROUP_SIZE) {
                let gal = document.createElement('div');
                gal.className = 'galaxy';
                
                // 新星系高亮特效
                if (g.isNew) {
                    gal.classList.add('new-burst');
                    delete g.isNew;
                }
                
                const size = 60 + Math.random() * 25;
                const r = Math.floor(Math.random() * 120) + 80;
                const g1 = Math.floor(Math.random() * 100) + 100;
                const b = 255;
                const a1 = (0.18 + Math.random() * 0.12).toFixed(2);
                const a2 = (0.14 + Math.random() * 0.10).toFixed(2);
                const a3 = (0.10 + Math.random() * 0.08).toFixed(2);
                
                gal.style.width = size + 'px';
                gal.style.height = size + 'px';
                gal.style.left = (g.x || 50) + '%';
                gal.style.top = (g.y || 50) + '%';
                gal.style.background = `
                    radial-gradient(circle, rgba(${r},${g1},${b},${a1}) 0%, transparent 40%),
                    radial-gradient(circle, rgba(${r-30},${g1-30},${b},${a2}) 0%, transparent 60%),
                    radial-gradient(circle, rgba(${r-60},${g1-60},${b},${a3}) 0%, transparent 80%)
                `;
                gal.onclick = () => openGalaxy(idx);
                main.appendChild(gal);
            }
        });

        // 渲染当前组星星 → 最后一颗紫色
        if (groups.length === 0) return;
        const last = groups[groups.length - 1];
        if (last.items.length < GROUP_SIZE) {
            last.items.forEach((it, i, arr) => {
                let s = document.createElement('div');
                s.className = 'star';
                
                let len = it.content.length;
                let style = getStarStyle(len);
                s.style.background = style.color;

                if (i === arr.length - 1) {
                    s.classList.add('last-purple');
                }

                s.style.left = it.x + '%';
                s.style.top = it.y + '%';
                let size = (Math.random() * 2.5 + 1).toFixed(1) * style.size;
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.animationDuration = (Math.random() * 3 + 2) + 's';
                s.style.setProperty('--o1', (Math.random() * 0.3 + 0.2).toFixed(2));
                s.style.setProperty('--o2', (Math.random() * 0.5 + 0.6).toFixed(2));
                s.onclick = () => {
                    modalDate.textContent = it.date;
                    modalContent.textContent = it.content;
                    modal.style.display = 'block';
                };
                main.appendChild(s);
            });
        }
    }

    // 打开星系 + 禁止空白点击
    function openGalaxy(idx) {
        let g = groups[idx];
        galaxyView.innerHTML = `
            <button onclick="goBack()" style="
                position: fixed; top:22px; left:22px; padding:9px 18px;
                background:rgba(255,255,255,0.22); backdrop-filter:blur(10px);
                border:none; border-radius:30px; color:#fff; font-size:14px; cursor:pointer; pointer-events:auto; z-index:9999;">
                ← 返回星海
            </button>
        `;
        galaxyView.style.display = 'block';

        g.items.forEach((it, i, arr) => {
            let s = document.createElement('div');
            s.className = 'star';
            
            let len = it.content.length;
            let style = getStarStyle(len);
            s.style.background = style.color;

            if (i === arr.length - 1) {
                s.classList.add('last-purple');
            }

            s.style.left = it.x + '%';
            s.style.top = it.y + '%';
            let size = (Math.random() * 2.2 + 1).toFixed(1) * style.size;
            s.style.width = size + 'px';
            s.style.height = size + 'px';
            s.style.animationDuration = (Math.random() * 2.5 + 2) + 's';
            s.style.setProperty('--o1', '0.3');
            s.style.setProperty('--o2', '0.9');
            s.onclick = () => {
                modalDate.textContent = it.date;
                modalContent.textContent = it.content;
                modal.style.display = 'block';
            };
            galaxyView.appendChild(s);
        });
    }

    // 验证
    function checkVerify() {
        return new Promise(resolve => {
            if (isVerified) return resolve(true);
            verifyModal.style.display = "flex";
            verifyInput.value = "";
            verifyInput.focus();
            verifyInput.onkeydown = function(e) {
                if(e.key === 'Enter'){
                    const val = verifyInput.value.trim();
                    if(val === "陈"){
                        isVerified = true;
                        verifyModal.style.display = "none";
                        toast("你 来了");
                        resolve(true);
                    } else {
                        toast("你 不是她");
                        resolve(false);
                    }
                }
            }
        })
    }

    // 发送
    async function add() {
        if (!isVerified) {
            let ok = await checkVerify();
            if (!ok) return;
        }

        let txt = input.value.trim();
        if (!txt) { toast("请输入想说的话"); return; }
        let date = new Date().toLocaleString('zh-CN', {
            year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'
        });
        const tx = Math.random()*90+5;
        const ty = Math.random()*80+10;
        let item = { content:txt, date, x:tx, y:ty };

        if (groups.length === 0) groups.push({items:[], x:50, y:50});
        let last = groups[groups.length - 1];

        if (last.items.length < GROUP_SIZE) {
            flyToTarget(tx, ty);
            last.items.push(item);
        } else {
            const gx = Math.random()*85+7;
            const gy = Math.random()*75+12;
            flyToTarget(gx, gy);

            groups.push({
                items: [item],
                x: gx,
                y: gy,
                isNew: true
            });
        }

        localStorage.setItem('groups', JSON.stringify(groups));
        renderMain();
        toast("✨ 每一次想念即是一颗星星");
        input.value = '';
    }

    plusBtn.onclick = () => {
        let inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = 'image/*';
        inp.onchange = () => {
            toast("📷 图片功能已启用");
        };
        inp.click();
    };

    sendBtn.addEventListener('click', add);
    input.addEventListener('keydown', function(e){
        if(e.key === 'Enter') add();
    });

    window.onclick = e => {
        if(e.target === modal) modal.style.display = 'none';
        if(e.target === verifyModal) verifyModal.style.display = 'none';
    };

    window.onload = function(){
        renderMain();
        input.focus();
    };
</script>
</body>
</html>
