<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>杳无音讯 | 我性空山</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
        width:100%;
        height:100%;
        background: #000;
        color:#fff;
        font-family: "PingFang SC","Microsoft YaHei",sans-serif;
        overflow: hidden;
    }

    /* 背景图（和你仓库文件名完全对应） */
    .bg {
        position: fixed;
        left:0; top:0;
        width:100%; height:100%;
        background-size: cover;
        background-position: center;
        z-index: 0;
    }
    @media (min-width: 768px) {
        .bg { background-image: url('./bg-landscape.jpg'); }
    }
    @media (max-width: 767px) {
        .bg { background-image: url('./bg-portrait.jpg'); }
    }

    /* 所有界面元素层级高于背景 */
    .star-counter,
    .input-area,
    .modal,
    .verify-modal,
    #mainView {
        position: fixed;
        z-index: 999;
    }

    .star-counter {
        top:20px; right:20px;
        padding:8px 16px;
        background:rgba(255,255,255,0.1);
        border-radius:30px;
        animation:twinkle 3s infinite;
        pointer-events: auto;
        cursor: pointer;
    }
    @keyframes twinkle {
        0%,100%{opacity:0.7;}
        50%{opacity:1;}
    }

    .input-area {
        bottom:10%;
        left:50%;
        transform:translateX(-50%);
        width:90%;
        max-width:500px;
        text-align:center;
    }
    .input-box {
        width:100%;
        padding:14px 20px;
        border-radius:30px;
        background:rgba(255,255,255,0.1);
        color:#fff;
        border:none;
        font-size:15px;
        margin-bottom:10px;
    }
    .send-btn {
        padding:10px 25px;
        border-radius:25px;
        background:rgba(255,255,255,0.2);
        color:#fff;
        border:none;
        font-size:14px;
        cursor: pointer;
    }

    .modal {
        top:50%; left:50%;
        transform:translate(-50%,-50%);
        background:rgba(0,0,0,0.9);
        padding:30px;
        border-radius:20px;
        display:none;
        color:#fff;
    }
    .verify-modal {
        top:0; left:0;
        width:100%; height:100%;
        background:rgba(0,0,0,0.9);
        display:none;
        align-items:center;
        justify-content:center;
    }
    .verify-input {
        padding:12px 20px;
        border-radius:30px;
        background:rgba(255,255,255,0.1);
        color:#fff;
        border:none;
        width:220px;
        text-align:center;
    }

    .star {
        position: absolute;
        background: #fff;
        border-radius: 50%;
        animation: twinkleStar 2s infinite;
        pointer-events: auto;
        cursor: pointer;
    }
    @keyframes twinkleStar {
        0%,100% { opacity: 0.3; }
        50% { opacity: 1; }
    }
</style>
</head>

<body>
<!-- 背景图 -->
<div class="bg"></div>

<!-- 背景音乐（和你仓库文件名完全对应） -->
<audio id="bgm" src="./bgm.mp3" loop preload="auto" volume="0.4">

<!-- 想念值计数器 -->
<div class="star-counter" id="starCounter">✨0</div>

<!-- 星空容器 -->
<div id="mainView"></div>

<!-- 输入框区域 -->
<div class="input-area">
    <input class="input-box" id="input" placeholder="给想念一处寄存的星海。">
    <button class="send-btn" id="sendBtn">星海会替你记得</button>
</div>

<!-- 查看星星的弹窗 -->
<div class="modal" id="modal">
    <div id="modalDate" style="font-size:12px;color:#aaa;margin-bottom:10px;"></div>
    <div id="modalContent"></div>
</div>

<!-- 口令验证弹窗 -->
<div class="verify-modal" id="verifyModal">
    <input class="verify-input" id="verifyInput" placeholder="你的名字">
</div>

<script>
    // 1. 音乐控制：点击计数器暂停/播放，无提示
    const bgm = document.getElementById('bgm');
    document.getElementById('starCounter').onclick = () => {
        bgm.paused ? bgm.play() : bgm.pause();
    };

    // 2. 解决手机/电脑自动播放限制：第一次交互时播放音乐
    function tryPlayBgm() {
        if (bgm.paused) bgm.play().catch(() => {});
    }
    document.body.addEventListener('click', tryPlayBgm, { once: true });
    document.body.addEventListener('touchstart', tryPlayBgm, { once: true, passive: true });

    // 3. 云端配置（和你之前的配置保持一致）
    const API_URL = "https://api.jsonbin.io/v3/b/6a06d65bc0954111d8280264";
    const API_KEY = "$2a$10$qB80mS9R8wjPkeiFI4l5SujXGYJyzUKpYOfH9kDM1FPBf8L9EnJVy";
    let groups = [];
    let isVerified = false;

    // 4. 更新想念值计数
    function updateStarCount() {
        let total = 0;
        groups.forEach(g => total += g.items.length);
        document.getElementById('starCounter').textContent = `✨${total}`;
    }

    // 5. 加载云端数据
    async function loadFromCloud() {
        try {
            let res = await fetch(API_URL, { headers: { "X-Master-Key": API_KEY } });
            let data = await res.json();
            groups = data.record || [{ items: [] }];
            renderStars();
            updateStarCount();
        } catch (e) {
            groups = [{ items: [] }];
        }
    }

    // 6. 渲染星星
    function renderStars() {
        const mainView = document.getElementById('mainView');
        mainView.innerHTML = '';
        if (groups.length === 0) return;
        const lastGroup = groups[groups.length - 1];
        lastGroup.items.forEach((item, index) => {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.left = item.x + '%';
            star.style.top = item.y + '%';
            star.style.width = (Math.random() * 2 + 1) + 'px';
            star.style.height = star.style.width;

            // 点击星星打开内容（需验证口令）
            star.onclick = async (e) => {
                e.stopPropagation();
                if (!await checkVerify()) return;
                document.getElementById('modalDate').textContent = item.date;
                document.getElementById('modalContent').textContent = item.content;
                document.getElementById('modal').style.display = 'block';
            };
            mainView.appendChild(star);
        });
    }

    // 7. 口令验证
    async function checkVerify() {
        return new Promise((resolve) => {
            if (isVerified) return resolve(true);
            document.getElementById('verifyModal').style.display = 'flex';
            document.getElementById('verifyInput').onkeydown = (e) => {
                if (e.key === 'Enter') {
                    if (document.getElementById('verifyInput').value.trim() === '陈') {
                        isVerified = true;
                        document.getElementById('verifyModal').style.display = 'none';
                        resolve(true);
                    } else {
                        resolve(false);
                    }
                }
            };
        });
    }

    // 8. 发送新内容
    document.getElementById('sendBtn').onclick = async () => {
        if (!await checkVerify()) return;
        let txt = document.getElementById('input').value.trim();
        if (!txt) return;

        let item = {
            content: txt,
            date: new Date().toLocaleString('zh-CN', {
                year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            }),
            x: Math.random() * 90 + 5,
            y: Math.random() * 60 + 10
        };

        if (groups.length === 0) groups.push({ items: [] });
        groups[groups.length - 1].items.push(item);

        // 保存到云端
        await fetch(API_URL, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                "X-Master-Key": API_KEY
            },
            body: JSON.stringify(groups)
        });

        renderStars();
        updateStarCount();
        document.getElementById('input').value = '';
    };

    // 9. 点击空白处关闭弹窗
    window.addEventListener('click', (e) => {
        if (e.target === document.getElementById('modal')) {
            document.getElementById('modal').style.display = 'none';
        }
        if (e.target === document.getElementById('verifyModal')) {
            document.getElementById('verifyModal').style.display = 'none';
        }
    });

    // 启动页面
    window.onload = loadFromCloud;
</script>
</body>
</html>
