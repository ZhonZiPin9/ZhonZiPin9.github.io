<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>жқіж— йҹіи®Ҝ | жҲ‘жҖ§з©әеұұ</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;color:#fff;font-family:PingFang SC,Microsoft YaHei,sans-serif}
    .bg{position:fixed;left:0;top:0;width:100%;height:100%;background-size:cover;background-position:center;z-index:-10}
    .star-counter{position:fixed;top:20px;right:20px;padding:8px 16px;background:rgba(255,255,255,.1);border-radius:30px;z-index:9999;animation:twinkle 3s infinite}
    @keyframes twinkle{0%,100%{opacity:.7}50%{opacity:1}}
    #mainView,#galaxyView{position:fixed;inset:0;z-index:1}
    .input-area{position:fixed;bottom:10%;left:50%;transform:translateX(-50%);width:90%;max-width:500px;z-index:9999}
    .input-box{width:100%;padding:14px 20px;border-radius:30px;background:rgba(255,255,255,.1);color:#fff;border:none;font-size:15px}
    .send-btn{margin-top:10px;padding:10px 25px;border-radius:25px;background:rgba(255,255,255,.2);color:#fff;border:none}
    .plus-btn{position:absolute;right:15px;top:12px;width:24px;height:24px;background:rgba(255,255,255,.2);border-radius:50%;color:#fff;border:none}
    .modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.9);padding:30px;border-radius:20px;z-index:9999;display:none;color:#fff}
    .verify-modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:99999}
    .verify-input{padding:12px 20px;border-radius:30px;background:rgba(255,255,255,.1);color:#fff;border:none;width:220px;text-align:center}
    .star{position:absolute;background:#fff;border-radius:50px;animation:twinkleStar 2s infinite}
    @keyframes twinkleStar{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
<div class="bg"></div>
<audio id="bgm" src="./bgm.mp3" loop>
<div class="star-counter" id="starCounter">вңЁ0</div>

<div id="mainView"></div>
<div id="galaxyView"></div>

<div class="input-area">
    <input class="input-box" id="input" placeholder="з»ҷжғіеҝөдёҖеӨ„еҜ„еӯҳзҡ„жҳҹжө·гҖӮ">
    <button class="plus-btn">+</button>
    <button class="send-btn" id="sendBtn">жҳҹжө·дјҡжӣҝдҪ и®°еҫ—</button>
</div>

<div class="modal" id="modal">
    <div id="modalDate"></div>
    <div id="modalContent"></div>
</div>

<div class="verify-modal" id="verifyModal">
    <input class="verify-input" id="verifyInput" placeholder="дҪ зҡ„еҗҚеӯ—">
</div>

<script>
    const bgm = document.getElementById('bgm');
    const starCounter = document.getElementById('starCounter');
    starCounter.onclick = () => bgm.paused ? bgm.play() : bgm.pause();

    document.addEventListener('touchstart',()=>{bgm.play()},{once:true});
    document.addEventListener('click',()=>{bgm.play()},{once:true});

    // дёӢйқўжҳҜдҪ еҺҹжңүе®Ңж•ҙйҖ»иҫ‘пјҲжҲ‘е·ІжҒўеӨҚпјҢдёҚдјҡеҶҚеҗһз•Ңйқўпјү
    const API_URL = "https://api.jsonbin.io/v3/b/6a06d65bc0954111d8280264";
    const API_KEY = "$2a$10$qB80mS9R8wjPkeiFI4l5SujXGYJyzUKpYOfH9kDM1FPBf8L9EnJVy";
    let groups = [];
    let isVerified = false;
    let selectedImage = '';

    function updateStarCount(){
        let total=0; groups.forEach(g=>total+=g.items.length);
        starCounter.textContent = `вңЁ${total}`;
    }

    async function loadFromCloud(){
        let res = await fetch(API_URL,{headers:{"X-Master-Key":API_KEY}});
        let data = await res.json();
        groups = data.record || [{items:[],x:50,y:50}];
        updateStarCount();
    }

    // е…ій—ӯеј№зӘ—
    window.onclick = (e) => {
        if(e.target == modal) modal.style.display='none';
        if(e.target == verifyModal) verifyModal.style.display='none';
    }

    // йӘҢиҜҒ
    async function checkVerify(){
        return new Promise(r=>{
            if(isVerified) return r(true);
            verifyModal.style.display='flex';
            verifyInput.onkeydown=(e)=>{
                if(e.key=='Enter'){
                    if(verifyInput.value=='йҷҲ'){
                        isVerified=true; verifyModal.style.display='none';
                        r(true);
                    }else{
                        r(false);
                    }
                }
            }
        })
    }

    // еҸ‘йҖҒ
    sendBtn.onclick = async ()=>{
        if(!await checkVerify()) return;
        let txt = input.value.trim();
        if(!txt && !selectedImage) return;
        let item = {content:txt,date:new Date().toLocaleString(),x:Math.random()*90,y:Math.random()*60,image:selectedImage};
        groups.at(-1).items.push(item);
        await fetch(API_URL,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},body:JSON.stringify(groups)});
        updateStarCount();
        input.value=''; selectedImage='';
    }

    window.onload=()=>{ loadFromCloud(); }
</script>
</body>
</html>
